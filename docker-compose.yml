services:

  web:
    build: .
    container_name: jly-projectbali3

    ports:
      - "8081:80"

    depends_on:
      - mysql

    restart: always

    volumes:
      - ./logs:/var/log/apache2

  mysql:
    image: mysql:8.0
    container_name: jly-mysql

    restart: always

    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: jly_projectbali

    ports:
      - "3306:3306"

    volumes:
      - mysql_data:/var/lib/mysql

  phpmyadmin:
    image: phpmyadmin/phpmyadmin
    container_name: jly-phpmyadmin

    restart: always

    ports:
      - "8082:80"

    environment:
      PMA_HOST: mysql
      MYSQL_ROOT_PASSWORD: root

    depends_on:
      - mysql

volumes:
  mysql_data:
